 <style>

        /* Tab Menu Styles */
        .tab-menu {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            /*padding: 0 20px; */
            padding-bottom: 10px;
            gap: 5px;
        }
        
        .tab-btn {
            padding: 15px 25px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 500;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .tab-btn:hover {
            color: #495057;
            background: #e9ecef;
        }
        
        .tab-btn.active {
            color: #007bff;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #007bff;
        }
        
        /* Tab Content */
        .tab-content {
            padding: 30px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        

        .custom-table {
            font-size: 12px;   /* change as needed */
        }


    </style>

{% include 'header.html' %}
    <div class="panel-body">
    <div class='row'>                     
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-header bg-info text-white" style='font-size:17px;font-weight:bold;'>
                         {{ request.scope.get("route").name.replace("-"," ").capitalize() }}
                     </div>
                    <div class="card-body table-responsive">
                        <div class="tab-menu">
                            <a href="/data-profiling?parameter=sample-data" style='text-decoration: none;' class="tab-btn active" id="overview" data-tab="overview">📊 Data Sample</a>

                            <a href="/data-profiling?parameter=statistics" style='text-decoration: none;'  class="tab-btn" id="statistics" data-tab="statistics">📈 Statistics</a>

                            <a href="/data-profiling?parameter=description" style='text-decoration: none;'  class="tab-btn" id="description" data-tab="description">📉 Description</a>

                            <a href="/data-profiling?parameter=summary" style='text-decoration: none;'  class="tab-btn" id="summary" data-tab="summary">📋 Summary</a>
                        </div>

                      {{pdf | safe }}
                    </div>
                </div>
            </div>
      </div>          
    </div>
<script>
        // Tab switching functionality
        document.querySelectorAll('.tab-btn').forEach(button => {
            button.addEventListener('click', () => {
                // Remove active class from all buttons and contents
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                
                // Add active class to clicked button
                button.classList.add('active');
                
                // Show corresponding content
                const tabId = button.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
            });
        });
    </script>
